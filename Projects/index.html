<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <h2>Color Changer</h2>
        </div>

        <div class="nav-links">
            <button>Home</button>
            <button>About</button>
        </div>
    </nav>

    <main class="container">
        <h1>Color Changer</h1>
        <p>Click a color below to change the background.</p>

        <div class="colors">
            <button class="color-btn" id="red">Red</button>
            <button class="color-btn" id="blue">Blue</button>
            <button class="color-btn" id="green">Green</button>
            <button class="color-btn" id="yellow">Yellow</button>
        </div>
    </main>

    <script src="change.js"></script>
</body>
</html>
